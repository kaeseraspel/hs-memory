
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HS-Memory</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:wght@700;900&family=DM+Sans:wght@400;500&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --amber: #FAC775;
    --amber-mid: #BA7517;
    --brown: #412402;
    --bg: #fffdf7;
    --card: #ffffff;
    --text: #1a1a1a;
    --text-muted: #666;
    --border: #e8e0d0;
    --green: #1D9E75;
    --green-bg: #EAF3DE;
    --red: #E24B4A;
    --red-bg: #FCEBEB;
  }

  html, body { height: 100%; overflow-x: hidden; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 1.25rem 1rem 2rem;
  }

  .app { width: 100%; max-width: 480px; }

  .screen { display: none; flex-direction: column; align-items: center; gap: 1.1rem; }
  .screen.active { display: flex; }

  h1 {
    font-family: 'Fraunces', serif;
    font-size: 2.6rem;
    font-weight: 900;
    text-align: center;
    line-height: 1.1;
    color: var(--text);
  }

  .subtitle { font-size: 1rem; color: var(--text-muted); text-align: center; }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 1.5rem;
    width: 100%;
  }

  input[type="password"], input[type="text"] {
    width: 100%;
    padding: 0.9rem 1rem;
    border: 1px solid var(--border);
    border-radius: 12px;
    font-size: 1.1rem;
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    margin-bottom: 0.85rem;
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }
  input:focus { border-color: var(--amber-mid); }

  .btn {
    width: 100%;
    padding: 1rem;
    border-radius: 12px;
    border: 1px solid var(--border);
    font-family: 'DM Sans', sans-serif;
    font-size: 1.05rem;
    font-weight: 500;
    cursor: pointer;
    background: var(--card);
    color: var(--text);
    transition: background 0.15s, transform 0.1s;
    touch-action: manipulation;
  }
  .btn:active { transform: scale(0.97); }

  .btn-primary { background: var(--amber); color: var(--brown); border-color: var(--amber-mid); }
  .btn-primary:active { background: var(--amber-mid); color: #fff; }

  .btn-row { display: flex; gap: 10px; width: 100%; }
  .btn-row .btn { flex: 1; padding: 1.1rem 0.4rem; font-size: 0.95rem; }

  .btn-yes { background: var(--green-bg); color: var(--green); border-color: var(--green); }
  .btn-yes:active { background: var(--green); color: #fff; }

  .btn-no { background: var(--red-bg); color: var(--red); border-color: var(--red); }
  .btn-no:active { background: var(--red); color: #fff; }

  .btn-reset {
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 0.8rem;
    padding: 0.4rem 0.5rem;
    width: auto;
    cursor: pointer;
    touch-action: manipulation;
    font-family: 'DM Sans', sans-serif;
  }

  .err { color: var(--red); font-size: 0.85rem; text-align: center; min-height: 1.2em; }

  .beer-row { display: flex; gap: 0.4rem; font-size: 2rem; }
  .beer { transition: all 0.3s; }
  .beer.lost { opacity: 0.15; transform: scale(0.8); }

  .top-bar { display: flex; justify-content: space-between; align-items: center; width: 100%; }
  .top-right { display: flex; align-items: center; gap: 6px; }

  .counter {
    font-size: 13px;
    color: var(--text-muted);
    background: #f5f0e8;
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    white-space: nowrap;
  }

  .img-card {
    width: 100%;
    min-height: 200px;
    background: #f5f0e8;
    border-radius: 16px;
    border: 1px solid var(--border);
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .img-card img {
    width: 100%;
    height: auto;
    display: block;
    max-height: 65vw;
    object-fit: contain;
  }
  .img-loading { font-size: 0.95rem; color: var(--text-muted); }

  .progress-bar { width: 100%; height: 5px; background: #e8e0d0; border-radius: 3px; }
  .progress-fill { height: 100%; background: var(--amber-mid); border-radius: 3px; transition: width 0.4s; }

  .question-label { font-size: 1rem; color: var(--text-muted); text-align: center; margin-bottom: 0.75rem; }

  .feedback-box {
    width: 100%;
    padding: 1.1rem;
    border-radius: 14px;
    text-align: center;
    font-weight: 500;
    font-size: 1.15rem;
  }
  .feedback-box.correct { background: var(--green-bg); color: var(--green); }
  .feedback-box.wrong { background: var(--red-bg); color: var(--red); }
  .feedback-sub { font-size: 0.85rem; font-weight: 400; margin-top: 0.3rem; }

  .score-row { display: flex; gap: 10px; width: 100%; }
  .score-card { flex: 1; background: #f5f0e8; border-radius: 12px; padding: 0.85rem; text-align: center; }
  .score-val { font-size: 1.6rem; font-weight: 500; }
  .score-lbl { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

  .result-emoji { font-size: 4.5rem; text-align: center; }

  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--amber-mid);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
  }
  .overlay.active { display: flex; }
  .overlay-box {
    background: var(--card);
    border-radius: 20px;
    padding: 1.75rem 1.5rem;
    width: 100%;
    max-width: 340px;
    text-align: center;
  }
  .overlay-box h2 { font-family: 'Fraunces', serif; font-size: 1.5rem; margin-bottom: 0.5rem; }
  .overlay-box p { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 1.25rem; }
  .overlay-btns { display: flex; gap: 10px; }
</style>
</head>
<body>
<div class="app">

  <!-- LOGIN -->
  <div class="screen active" id="screen-login">
    <div style="font-size:3.5rem;margin-top:1.5rem">🍺</div>
    <h1>HS-Memory</h1>
    <p class="subtitle">Nur för wahre Söffer!</p>
    <div class="card" style="margin-top:0.5rem">
      <input type="password" id="pw-input" placeholder="Passwort" onkeydown="if(event.key==='Enter')checkPw()" autocomplete="current-password" />
      <div class="err" id="pw-err"></div>
      <button class="btn btn-primary" onclick="checkPw()" style="margin-top:0.25rem">Erin komme →</button>
    </div>
  </div>

  <!-- NAME -->
  <div class="screen" id="screen-name">
    <div style="font-size:3rem;margin-top:1.5rem">👋</div>
    <h1>Wie heißt du?</h1>
    <p class="subtitle">Damit dein Spielstand gespeichert wird.</p>
    <div class="card">
      <input type="text" id="name-input" placeholder="Dein Name" onkeydown="if(event.key==='Enter')startGame()" autocomplete="nickname" />
      <div class="err" id="name-err"></div>
      <button class="btn btn-primary" onclick="startGame()">Lass mal richtig saufen jetzt, du Keko! 🍺</button>
    </div>
  </div>

  <!-- LOADING -->
  <div class="screen" id="screen-loading">
    <div style="font-size:3rem;margin-top:3rem">🍺</div>
    <p style="color:var(--text-muted);font-size:1rem">Bilder werden geladen...</p>
    <div class="spinner"></div>
  </div>

  <!-- GAME -->
  <div class="screen" id="screen-game">
    <div class="top-bar">
      <div class="beer-row" id="lives"></div>
      <div class="top-right">
        <div class="counter" id="img-counter"></div>
        <button class="btn-reset" onclick="confirmReset()">↩ Reset</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    <div class="img-card" id="game-img">
      <span class="img-loading">Bild wird geladen...</span>
    </div>
    <div id="question-area" style="width:100%">
      <p class="question-label">Häste dat Bild scho jesehe?</p>
      <div class="btn-row">
        <button class="btn btn-yes" onclick="answer(true)">Jo, dat kenn ich! 👁️</button>
        <button class="btn btn-no" onclick="answer(false)">Noch nie jesenn! 🆕</button>
      </div>
    </div>
    <div id="feedback-area" style="display:none;width:100%">
      <div class="feedback-box" id="feedback-box">
        <div id="feedback-text"></div>
        <div class="feedback-sub" id="feedback-sub"></div>
      </div>
      <button class="btn btn-primary" style="margin-top:0.85rem" onclick="nextImage()">Nächstes Bild →</button>
    </div>
  </div>

  <!-- RESULT -->
  <div class="screen" id="screen-result">
    <div class="result-emoji" id="result-emoji" style="margin-top:1.5rem"></div>
    <h1 id="result-title"></h1>
    <p class="subtitle" id="result-sub"></p>
    <div class="score-row">
      <div class="score-card"><div class="score-val" id="res-correct"></div><div class="score-lbl">Richtig</div></div>
      <div class="score-card"><div class="score-val" id="res-wrong"></div><div class="score-lbl">Falsch</div></div>
      <div class="score-card"><div class="score-val" id="res-lives"></div><div class="score-lbl">Leben übrig</div></div>
    </div>
    <button class="btn btn-primary" onclick="resetToName()" style="margin-top:0.5rem">Nochmal spielen! 🔄</button>
  </div>

</div>

<!-- RESET BESTÄTIGUNG -->
<div class="overlay" id="reset-overlay">
  <div class="overlay-box">
    <h2>Wirklich neu starten?</h2>
    <p>Dein aktueller Spielstand geht verloren!</p>
    <div class="overlay-btns">
      <button class="btn" onclick="closeReset()" style="flex:1">Abbrechen</button>
      <button class="btn btn-primary" onclick="doReset()" style="flex:1">Ja, neu!</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://jcjgyqpsbayxxsbqgpiz.supabase.co';
const SUPABASE_KEY = 'sb_publishable_eD7mNkWYJjyhtVsuHXZTnQ_AbxhZjUl';
const PASSWORD = 'derHStrinktzuvielKölsch95';
const BUCKET = 'Fotos HS';

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

let state = {
  playerName: '',
  lives: 3,
  allImages: [],
  queue: [],
  seen: [],
  current: null,
  correct: 0,
  wrong: 0,
  answered: false,
  sessionId: null,
  questionIndex: 0,
  totalQuestions: 0,
};

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function checkPw() {
  const val = document.getElementById('pw-input').value;
  if (val === PASSWORD) {
    document.getElementById('pw-err').textContent = '';
    show('screen-name');
  } else {
    document.getElementById('pw-err').textContent = 'Falsches Passwort du Sürther Schmutz';
  }
}

async function startGame() {
  const name = document.getElementById('name-input').value.trim();
  if (!name) {
    document.getElementById('name-err').textContent = 'Gib bitte deinen Namen ein!';
    return;
  }
  state.playerName = name;
  document.getElementById('name-err').textContent = '';
  show('screen-loading');

  try {
    const { data, error } = await db.storage.from(BUCKET).list('', { limit: 300 });
    if (error) throw error;

    const images = data.filter(f => f.name.match(/\.(jpg|jpeg|png|gif|webp)$/i));
    if (images.length === 0) {
      alert('Keine Bilder im Storage gefunden!');
      show('screen-name');
      return;
    }

    const shuffled = shuffle([...images]);
    state.allImages = shuffled;
    state.seen = [];
    state.lives = 3;
    state.correct = 0;
    state.wrong = 0;
    state.answered = false;
    state.current = null;
    state.questionIndex = 0;

    const n = shuffled.length;
    const TARGET = 250;
    const queue = [];
    let newIdx = 0;
    const seenSoFar = [];

    for (let i = 0; i < TARGET; i++) {
      const forceNew = i < 3 || newIdx >= n;
      const canRepeat = seenSoFar.length > 1 && !forceNew;
      const useRepeat = canRepeat && Math.random() < 0.55;
      const lastImg = queue.length > 0 ? queue[queue.length - 1].img : null;

      if (useRepeat) {
        const candidates = seenSoFar.filter(img => img !== lastImg);
        if (candidates.length === 0) {
          if (newIdx >= n) break;
          const pick = shuffled[newIdx++];
          seenSoFar.push(pick);
          queue.push({ img: pick, isRepeat: false });
        } else {
          const pick = candidates[Math.floor(Math.random() * candidates.length)];
          queue.push({ img: pick, isRepeat: true });
        }
      } else {
        if (newIdx >= n) {
          const candidates = seenSoFar.filter(img => img !== lastImg);
          if (candidates.length === 0) break;
          const pick = candidates[Math.floor(Math.random() * candidates.length)];
          queue.push({ img: pick, isRepeat: true });
        } else {
          const pick = shuffled[newIdx++];
          seenSoFar.push(pick);
          queue.push({ img: pick, isRepeat: false });
        }
      }
    }
    state.queue = queue;
    state.totalQuestions = queue.length;

    const { data: session } = await db.from('game_sessions').insert({
      player_name: name,
      lives_left: 3,
      correct: 0,
      wrong: 0,
      finished: false,
    }).select().single();
    if (session) state.sessionId = session.id;

    renderLives();
    show('screen-game');
    loadNext();
  } catch (e) {
    alert('Fehler beim Laden: ' + e.message);
    show('screen-name');
  }
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function renderLives() {
  document.getElementById('lives').innerHTML =
    [0,1,2].map(i => `<span class="beer ${i >= state.lives ? 'lost' : ''}">🍺</span>`).join('');
}

async function loadNext() {
  if (state.questionIndex >= state.queue.length) { endGame(true); return; }

  document.getElementById('question-area').style.display = 'block';
  document.getElementById('feedback-area').style.display = 'none';
  state.answered = false;

  const { img, isRepeat } = state.queue[state.questionIndex];
  state.current = { img, isRepeat };

  const done = state.questionIndex + 1;
  const total = state.totalQuestions;
  document.getElementById('img-counter').textContent = `${done} / ${total}`;
  document.getElementById('progress-fill').style.width = `${(done / total) * 100}%`;

  const imgEl = document.getElementById('game-img');
  imgEl.innerHTML = '<span class="img-loading">⏳</span>';

  const { data } = db.storage.from(BUCKET).getPublicUrl(img.name);
  const url = data.publicUrl;

  const image = new Image();
  image.onload = () => { imgEl.innerHTML = ''; imgEl.appendChild(image); };
  image.onerror = () => { imgEl.innerHTML = '<span class="img-loading">Bild nicht ladbar</span>'; };
  image.src = url;
  image.style.cssText = 'width:100%;height:auto;max-height:65vw;object-fit:contain;display:block;';
}

function answer(saidYes) {
  if (state.answered) return;
  state.answered = true;

  const { img, isRepeat } = state.current;
  const correct = saidYes === isRepeat;

  const fb = document.getElementById('feedback-box');
  const ft = document.getElementById('feedback-text');
  const fs = document.getElementById('feedback-sub');

  if (correct) {
    state.correct++;
    fb.className = 'feedback-box correct';
    ft.textContent = '✅ Richtig!';
    fs.textContent = isRepeat ? 'Ja, dat Bild hattes du schon jesehen!' : 'Genau – dat Bild is neu für dich!';
    if (!isRepeat) state.seen.push(img);
  } else {
    state.wrong++;
    state.lives--;
    fb.className = 'feedback-box wrong';
    ft.textContent = '❌ Falsch – du HUUURENSOHN';
    fs.textContent = isRepeat ? 'Dat Bild hattest du schon jesehen!' : 'Dat Bild war noch neu für dich!';
    if (!isRepeat) state.seen.push(img);
    renderLives();
    if (state.lives <= 0) {
      saveSession(false);
      state.questionIndex++;
      document.getElementById('question-area').style.display = 'none';
      document.getElementById('feedback-area').style.display = 'block';
      document.querySelector('#feedback-area .btn').style.display = 'none';
      setTimeout(() => endGame(false), 1200);
      return;
    }
  }

  document.getElementById('question-area').style.display = 'none';
  document.getElementById('feedback-area').style.display = 'block';
  document.querySelector('#feedback-area .btn').style.display = 'block';
}

function nextImage() { state.questionIndex++; loadNext(); }

async function saveSession(won) {
  if (!state.sessionId) return;
  await db.from('game_sessions').update({
    lives_left: state.lives,
    correct: state.correct,
    wrong: state.wrong,
    finished: true,
  }).eq('id', state.sessionId);
}

function endGame(won) {
  saveSession(won);
  document.getElementById('result-emoji').textContent = won ? '🎉' : '😢';
  document.getElementById('result-title').textContent = won ? 'Jewonne!' : 'Spiel vorbei!';
  document.getElementById('result-sub').textContent = won
    ? `Super gemacht, ${state.playerName}! Alle Bilder erkannt!`
    : `Alle Leeven verspielt, ${state.playerName}!`;
  document.getElementById('res-correct').textContent = state.correct;
  document.getElementById('res-wrong').textContent = state.wrong;
  document.getElementById('res-lives').textContent = state.lives + ' 🍺';
  show('screen-result');
}

function resetToName() { show('screen-name'); }
function confirmReset() { document.getElementById('reset-overlay').classList.add('active'); }
function closeReset() { document.getElementById('reset-overlay').classList.remove('active'); }
function doReset() { closeReset(); show('screen-name'); }
</script>
</body>
</html>
